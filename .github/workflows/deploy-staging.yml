# This is a basic workflow to help you get started with Actions

name: Stage the app

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  pull_request:
    types: [labeled] 

env:
  IMAGE_REGISTRY_URL: ghcr.io
  DOCKER_IMAGE_NAME: PrakharKrM-azure-ttt
  AZURE_WEBAPP_NAME: PrakharKrM-ttt-app

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'stage')
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 16
      
      - name: npm install and build webpack
        run:
          npm install
          npm run build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: webpack artifacts
          path: public

  Build-Docker-Image:
    name: Build Docker image, uplod it on Github Repository  which can be used to deploy webapp
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout on runner
        uses: actions/checkout@v7
      
      - name: Download previously Build Artifact
        uses: actions/download-artifact@v7
        with:
          name: webpack artifacts
          path: public
      
      - name: Login to GHCR (Docker repository)
        uses: docker/login-action@v4
        with:
          registry: ${{env.IMAGE_REGISTRY_URL}}
          username: ${{github.actor}}
          password: ${{secrets.CR_PAT}}
      
      - name: Extract Metadata (tags, labels) for Doker image
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{env.IMAGE_REGISTRY_URL}}/${{ github.repository }}/${{env.DOCKER_IMAGE_NAME}}
          tags: |
            type=sha,format=long,prefix=

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{steps.meta.outputs.tags}}
          labels: ${{steps.meta.output.labels}}
      
  Deploy-to-Azure:
    runs-on: ubuntu-latest
    needs: Build-Docker-Image
    name: Deploye app container to azure
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Azure Docker Login
        uses: azure/docker-login@v2
        with:
          login-server: ${{env.IMAGE_REGISTRY_URL}}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}
      
      - name: Deploy web app container
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{env.AZURE_WEBAPP_NAME}}
          images: ${{env.IMAGE_REGISTRY_URL}}/${{ github.repository }}/${{env.DOCKER_IMAGE_NAME}}:${{ github.sha }}

      - name: Azure logout via Azure CLI
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az logout
            az cache purge
            az account clear